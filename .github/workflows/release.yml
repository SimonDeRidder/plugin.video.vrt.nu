# This workflow performs an automated release to GitHub and to the official
# Kodi repository, for a pre-Matrix and a post-Matrix release.

name: Release
on:
  push:
    tags:
    - 'v*'
jobs:
  build:
    name: Release plugin.video.vrt.nu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # 1.94.1
      - name: Build zip files
        run: |
          sudo apt-get update
          sudo apt-get install libxml2-utils
          make build release=1
      - name: Get Release filename
        id: get-release-filename
        run: |
          echo release-filename=$(cd ..;ls plugin.video.vrt.nu.*.zip | head -1) >> $GITHUB_OUTPUT
      - name: Get body
        id: get-body
        run: |
          description=$(sed '1,/^## Releases$/d;/## v[0-9\.]* ([0-9-]*)/d;/^$/,$d' README.md)
          echo $description
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "body<<$EOF" >> $GITHUB_OUTPUT
          echo "$description" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          body: ${{ steps.get-body.outputs.body }}
          draft: false
          prerelease: false
          files: |
            ../${{ steps.get-release-filename.outputs.release-filename }}
